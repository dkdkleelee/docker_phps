# ======================================================
# withusnews.dk (로컬 개발용 HTTP)
# ======================================================
<VirtualHost *:8080>
    ServerName withusnews.dk
    ServerAlias www.withusnews.dk
    DocumentRoot /var/www/withusLanding/withusnews.dk

    AddDefaultCharset UTF-8

    <Directory /var/www/withusLanding/withusnews.dk>
        Options FollowSymLinks MultiViews
        AddType application/x-httpd-php .php .html
        AllowOverride FileInfo
        Require all granted
        <FilesMatch "(input\.log|api\.log)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/withusNews-error.log
    CustomLog ${APACHE_LOG_DIR}/withusNews-access.log combined
</VirtualHost>


