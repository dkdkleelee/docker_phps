# ======================================================
# withusCRM - 직원용 CRM (네이티브 DB / 로컬 개발용 HTTP)
# ======================================================
<VirtualHost *:8080>
    ServerName emp.withusmk.dk
    ServerAlias www.emp.withusmk.dk
    DocumentRoot /var/www/withusCRM

    <Directory /var/www/withusCRM>
        Options FollowSymLinks MultiViews
        AddType application/x-httpd-php .php
        AllowOverride FileInfo
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/withusCRM-error.log
    CustomLog ${APACHE_LOG_DIR}/withusCRM-access.log combined
</VirtualHost>


