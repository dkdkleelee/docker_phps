services:

  # ============================================================
  # Nginx - 80포트 대표 (모든 도메인 진입점)
  # ============================================================
  nginx:
    image: nginx:stable-alpine
    container_name: local_nginx
    ports:
      - "80:80"
    volumes:
      # choharu 프로젝트
      - ../choharu:/var/www/choharu
      - ../choharu2:/var/www/choharu2
      # Nginx 설정
      - ./nginx/deeptrue.conf:/etc/nginx/conf.d/deeptrue.conf
      - ./nginx/choharutwo.conf:/etc/nginx/conf.d/choharutwo.conf
      - ./nginx/proxy.conf:/etc/nginx/conf.d/proxy.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - apache
      - php74
    restart: unless-stopped

  # ============================================================
  # PHP 8.1 + Apache - customsg / withus (내부 8080)
  # ============================================================
  apache:
    build:
      context: ./apache
      dockerfile: Dockerfile
    container_name: local_apache
    expose:
      - "8080"
    volumes:
      # customsg 프로젝트
      - ../customsgCRM:/var/www/customsgCRM
      - ../customsgPTN:/var/www/customsgPTN
      - ../customsgLANDING:/var/www/customsgLANDING
      # withus 프로젝트
      - ../withusCRM:/var/www/withusCRM
      - ../withusPTN:/var/www/withusPTN
      - ../withusLanding:/var/www/withusLanding
      # Apache 설정
      - ./apache/vhosts.conf:/etc/apache2/sites-enabled/local.conf
      - ./apache/ports.conf:/etc/apache2/ports.conf
      # Xdebug 로컬 개발용
      - ./apache/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    environment:
      MYSQL_HOST: local_mariadb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # PHP 7.4 FPM - choharu / choharu2 전용
  # ============================================================
  php74:
    build:
      context: ./php74
      dockerfile: Dockerfile
    container_name: local_php74
    expose:
      - "9000"
    volumes:
      - ../choharu:/var/www/choharu
      - ../choharu2:/var/www/choharu2
      - ./php74/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ============================================================
  # MariaDB 10.11 - customsg 전용
  # ============================================================
  mariadb:
    image: mariadb:10.11
    container_name: local_mariadb
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/50-server.cnf:/etc/mysql/mariadb.conf.d/50-server.cnf:ro
      - ./mysql/migrations:/migrations
      - ./mysql/migrate.sh:/migrate.sh
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mariadb_data:
    driver: local
